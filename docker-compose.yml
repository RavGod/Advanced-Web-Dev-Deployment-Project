services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_directory
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./create_database.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data: